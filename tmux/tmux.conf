#----------------------------------------------------------------------
# File: .tmux.conf
# Info: Tmux configuration file
# Author: Adam Brauns (@AdamBrauns)
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# General Settings
#----------------------------------------------------------------------

# Enable mouse support for pane selection, resizing, and scrolling
set -g mouse on

# Start window numbering at 1 instead of 0
set -g base-index 1

# Start pane numbering at 1 instead of 0
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set-option -g renumber-windows on

#----------------------------------------------------------------------
# Key Bindings
#----------------------------------------------------------------------

# Reload tmux configuration with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# Use vi key bindings in copy mode
setw -g mode-keys vi

# Vi-style pane navigation (h=left, j=down, k=up, l=right)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#----------------------------------------------------------------------
# Visual/UI Settings
#----------------------------------------------------------------------

# Move status bar to top of screen
set-option -g status-position top

# Status bar colors (bg=background, fg=foreground/text)
set-option -g status-style bg=#0a2e0a,fg=#666666

# Inactive window styling
setw -g window-status-style fg=#666666,bg=#0a2e0a

# Active/current window styling - bright with bold text
setw -g window-status-current-style fg=white,bg=#156015,bold

# Clear the right side of status bar
set -g status-right ""

# Pane border colors
set-option -g pane-border-style fg=#0a2e0a
set-option -g pane-active-border-style fg=#156015
