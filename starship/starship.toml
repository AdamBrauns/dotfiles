#----------------------------------------------------------------------
# File: starship.toml
# Info: Startship configuration file
# Author: Adam Brauns (@AdamBrauns)
#----------------------------------------------------------------------

palette = "catppuccin_mocha"

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'
symbol = '🌥️  '

[battery]
charging_symbol = '🔌 '
discharging_symbol = '🔦 '
empty_symbol = '💀 '
full_symbol = '🔋 '

[[battery.display]]
style = 'bold yellow'
threshold = 30

[[battery.display]]
discharging_symbol = '🚨 '
style = 'bold red'
threshold = 10

[character]
error_symbol = '[✘](bold red)'
success_symbol = '[❯](bold green)'

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 ms (10 sec)

[directory]
style = 'bold cyan'
truncation_length = 3
truncation_symbol = ''

[git_branch]
ignore_branches = ['master']
style = 'bold purple'
symbol = '🌱 '

[git_commit]
commit_hash_length = 8
tag_symbol = '🏷  '

[git_status]
ahead = "🏎️💨×${count}"
behind = "🐢×${count}"
conflicted = '🖇️ '
deleted = "🗑️ ×${count}"
diverged = "🔱 🏎️💨×${ahead_count} 🐢×${behind_count}"
modified = "📝×${count} "
renamed = "📛×${count} "
staged = "🗃️ ×${count} "
stashed = "📦 "
style = 'bold green'
untracked = "🛤️ ×${count} "
up_to_date = '✅'

[nodejs]
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
