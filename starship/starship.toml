# ------------------------------------------------------------------------------
# File: starship.toml
# Info: Startship configuration file
# Author: Adam Brauns (@AdamBrauns)
# ------------------------------------------------------------------------------

# Allow slower modules up to 1s before timing out
command_timeout = 1000

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'
symbol = '🌥️  '

[battery]
charging_symbol = '🔌 '
discharging_symbol = '🔦 '
empty_symbol = '💀 '
full_symbol = '🔋 '

[[battery.display]]
discharging_symbol = '🚨 '
style = 'bold red'
threshold = 10

[[battery.display]]
style = 'bold yellow'
threshold = 30

[character]
error_symbol = '[✘](bold red)'
success_symbol = '[❯](bold green)'

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 ms (10 sec)

[directory]
style = 'bold cyan'
truncation_length = 3
truncation_symbol = ''

[git_branch]
ignore_branches = ['main', 'master']
style = 'bold purple'
symbol = '🌱 '

[git_commit]
commit_hash_length = 8
tag_symbol = '🏷  '

[git_status]
format = '([$all_status$ahead_behind]($style))'
ahead = '🏎️💨×${count} '
behind = '🐢×${count} '
conflicted = '🖇️ '
deleted = '🗑️ ×${count} '
diverged = '🔱 🏎️💨×${ahead_count} 🐢×${behind_count} '
modified = '📝×${count} '
renamed = '📛×${count} '
staged = '🗃️ ×${count} '
stashed = '📦 '
style = 'bold green'
untracked = '🛤️ ×${count} '
up_to_date = ''

[nodejs]
disabled = true

[package]
disabled = true
