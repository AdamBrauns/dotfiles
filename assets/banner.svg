<!-- Copyright (c) 2026 Adam Brauns (@AdamBrauns) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-label="adam's dotfiles - animated isometric banner">
  <title>adam's dotfiles</title>

  <defs>
    <!-- Vibrant wordmark sweep: pink -> orange -> gold -> teal -->
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0%"   stop-color="#FF6FB1"/>
      <stop offset="38%"  stop-color="#FF6A2B"/>
      <stop offset="72%"  stop-color="#FFC93D"/>
      <stop offset="100%" stop-color="#16C79E"/>
    </linearGradient>

    <!-- Glossy card faces (lit from top-left) -->
    <linearGradient id="cgPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7DB8"/><stop offset="55%" stop-color="#F0246A"/><stop offset="100%" stop-color="#B80030"/>
    </linearGradient>
    <linearGradient id="cgOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB36B"/><stop offset="50%" stop-color="#FF6A2B"/><stop offset="100%" stop-color="#E22A00"/>
    </linearGradient>
    <linearGradient id="cgGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE680"/><stop offset="50%" stop-color="#FFC93D"/><stop offset="100%" stop-color="#F59A00"/>
    </linearGradient>
    <linearGradient id="cgTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0D0"/><stop offset="50%" stop-color="#12C79E"/><stop offset="100%" stop-color="#009A6E"/>
    </linearGradient>

    <!-- Top sheen overlay -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="cardshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="-8" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <!-- Soft bloom for the wordmark -->
    <filter id="bloom" x="-25%" y="-45%" width="150%" height="190%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <g id="scene" opacity="0">
    <animate attributeName="opacity" values="0;1" keyTimes="0;1" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
                      values="0 18;0 0" keyTimes="0;1" calcMode="spline" keySplines="0.2 0.8 0.2 1"
                      dur="0.7s" fill="freeze"/>

    <!-- ============================ Left: wordmark lockup ============================ -->
    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
      <!-- wordmark: soft bloom behind, crisp on top -->
      <text x="62" y="170" font-size="68" font-weight="800" textLength="224" lengthAdjust="spacing" fill="url(#word)" filter="url(#bloom)" opacity="0.5">dotfiles</text>
      <text x="62" y="170" font-size="68" font-weight="800" textLength="224" lengthAdjust="spacing" fill="url(#word)">dotfiles</text>
      <!-- gradient keyline accent, matched to the wordmark width -->
      <rect x="64" y="186" width="220" height="5" rx="2.5" fill="url(#word)"/>
      <!-- author handle -->
      <text x="66" y="222" font-size="16" letter-spacing="0.3" font-weight="600"
            font-family="'SF Mono','SFMono-Regular',Menlo,ui-monospace,monospace">
        <tspan fill="#16C79E" font-weight="700">@</tspan><tspan fill="#7E7E7C">AdamBrauns</tspan>
      </text>
      <!-- tagline -->
      <text x="66" y="248" font-size="16" font-weight="500" fill="#7E7E7C">macOS &#183; Linux &#8212; symlinked &amp; versioned</text>
      <!-- command chip -->
      <rect x="64" y="266" width="304" height="36" rx="18" fill="#808080" fill-opacity="0.08" stroke="#808080" stroke-opacity="0.5"/>
      <text x="82" y="290" font-size="16" textLength="268" lengthAdjust="spacing" font-family="'SF Mono','SFMono-Regular',Menlo,ui-monospace,monospace">
        <tspan fill="#FF2400" font-weight="700">&#10095; </tspan><tspan fill="#7E7E7C">git clone &amp;&amp; make install</tspan>
      </text>
    </g>

    <!-- ============================ Right: isometric card cascade ============================ -->
    <!-- Card 1 (back): pink "bash" -->
    <g transform="translate(500,142)">
      <animateTransform attributeName="transform" type="translate" additive="sum"
                        values="0 0;0 -12;0 0" keyTimes="0;0.5;1" dur="3.4s" begin="0s"
                        repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="rotate(-20) scale(0.82)">
        <rect x="-68" y="-84" width="150" height="190" rx="16" fill="#8E0026"/>
        <rect x="-75" y="-95" width="150" height="190" rx="16" fill="url(#cgPink)" filter="url(#cardshadow)"/>
        <rect x="-67" y="-87" width="134" height="98" rx="12" fill="url(#sheen)"/>
        <text x="-3" y="5" text-anchor="middle" font-size="24" font-weight="800" letter-spacing="0.5"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" fill="#FFFFFF">bash</text>
      </g>
    </g>

    <!-- Card 2: orange "git" -->
    <g transform="translate(620,176)">
      <animateTransform attributeName="transform" type="translate" additive="sum"
                        values="0 0;0 -12;0 0" keyTimes="0;0.5;1" dur="3.9s" begin="-1.3s"
                        repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="rotate(-20) scale(0.9)">
        <rect x="-68" y="-84" width="150" height="190" rx="16" fill="#A11C00"/>
        <rect x="-75" y="-95" width="150" height="190" rx="16" fill="url(#cgOrange)" filter="url(#cardshadow)"/>
        <rect x="-67" y="-87" width="134" height="98" rx="12" fill="url(#sheen)"/>
        <text x="-3" y="5" text-anchor="middle" font-size="24" font-weight="800" letter-spacing="0.5"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" fill="#3A1300">git</text>
      </g>
    </g>

    <!-- Card 3: gold "vim" -->
    <g transform="translate(740,210)">
      <animateTransform attributeName="transform" type="translate" additive="sum"
                        values="0 0;0 -12;0 0" keyTimes="0;0.5;1" dur="3.6s" begin="-2.1s"
                        repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="rotate(-20) scale(0.97)">
        <rect x="-68" y="-84" width="150" height="190" rx="16" fill="#B06A00"/>
        <rect x="-75" y="-95" width="150" height="190" rx="16" fill="url(#cgGold)" filter="url(#cardshadow)"/>
        <rect x="-67" y="-87" width="134" height="98" rx="12" fill="url(#sheen)"/>
        <text x="-3" y="5" text-anchor="middle" font-size="24" font-weight="800" letter-spacing="0.5"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" fill="#4A3300">vim</text>
      </g>
    </g>

    <!-- Card 4 (front): teal "tmux" -->
    <g transform="translate(860,244)">
      <animateTransform attributeName="transform" type="translate" additive="sum"
                        values="0 0;0 -12;0 0" keyTimes="0;0.5;1" dur="4.2s" begin="-0.8s"
                        repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="rotate(-20) scale(1.05)">
        <rect x="-68" y="-84" width="150" height="190" rx="16" fill="#00674A"/>
        <rect x="-75" y="-95" width="150" height="190" rx="16" fill="url(#cgTeal)" filter="url(#cardshadow)"/>
        <rect x="-67" y="-87" width="134" height="98" rx="12" fill="url(#sheen)"/>
        <text x="-3" y="5" text-anchor="middle" font-size="24" font-weight="800" letter-spacing="0.5"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" fill="#013626">tmux</text>
      </g>
    </g>
  </g>
</svg>
