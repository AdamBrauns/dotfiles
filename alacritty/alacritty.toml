# ------------------------------------------------------------------------------
# File: alacritty.toml
# Info: Alacritty configuration file
# Author: Adam Brauns (@AdamBrauns)
# ------------------------------------------------------------------------------

[general]
import = ["~/.config/alacritty/themes/blood_moon.toml"]
live_config_reload = true

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[env]
TERM = "alacritty"

[font]
size = 20
normal = { family = "Menlo", style = "Regular" }

# Require holding Cmd to click links open, so a stray focus-click does nothing.
# (Single-quoted TOML literal string so regex backslashes need no escaping.)
[[hints.enabled]]
regex = '(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\s<>"]+'
hyperlinks = true
command = "open"
post_processing = true
persist = false
mouse = { enabled = true, mods = "Command" }
binding = { key = "U", mods = "Control|Shift" }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[mouse]
hide_when_typing = true
bindings = [{ mouse = "Right", action = "Paste" }]

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[terminal]
shell.program = "/opt/homebrew/bin/bash"

[window]
decorations = "Full"
decorations_theme_variant = "Dark"
dimensions = { columns = 100, lines = 35 }
# Treat both Option keys as Alt/Meta so readline word-motions (Alt+f/b/d) work.
option_as_alt = "Both"
opacity = 0.9
padding = { x = 20, y = 20 }
title = ""
dynamic_title = false
